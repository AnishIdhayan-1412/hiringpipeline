# ============================================================
# Bias-Free Hiring Pipeline — GitHub Actions CI/CD
# Sprint 3 — Runs on every push and pull request to main
#
# Jobs:
#   test    — install deps, run pytest, upload coverage
#   lint    — flake8 style check (non-blocking)
#   docker  — build image (validates Dockerfile syntax + build)
# ============================================================

name: CI

on:
  push:
    branches: ["main", "sprint-*"]
  pull_request:
    branches: ["main"]

env:
  PYTHON_VERSION: "3.11"
  SKIP_LARGE_MODELS: "1"   # use small model in CI to save time/memory

jobs:
  # ── Job 1: Unit tests ─────────────────────────────────────────────────
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # Install only lightweight deps needed for unit tests
          # (avoids downloading 500 MB of ML models in CI)
          pip install flask flask-cors tqdm

      - name: Run unit tests
        run: |
          python -m pytest tests/ -v \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml \
            --ignore=tests/test_ranking_integration.py \
            -x

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: coverage.xml
          fail_ci_if_error: false

  # ── Job 2: Lint ───────────────────────────────────────────────────────
  lint:
    name: flake8 lint
    runs-on: ubuntu-latest
    continue-on-error: true   # non-blocking — warnings only

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
      - run: pip install flake8
      - name: Run flake8
        run: |
          flake8 . \
            --max-line-length=100 \
            --extend-ignore=E203,W503,E501 \
            --exclude=.venv,venv,__pycache__,.git \
            --count --statistics || true

  # ── Job 3: Docker build validation ───────────────────────────────────
  docker:
    name: Docker build (SKIP_LARGE_MODELS=1)
    runs-on: ubuntu-latest
    needs: test   # only build if tests pass

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: hiring-pipeline:ci
          build-args: |
            SKIP_LARGE_MODELS=1
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — /health endpoint
        run: |
          docker run -d --name hp-smoke -p 5000:5000 hiring-pipeline:ci
          sleep 15
          curl -f http://localhost:5000/health || (docker logs hp-smoke && exit 1)
          docker stop hp-smoke
